name: Bump ModSharp

on:
  schedule:
    - cron: '0 15 * * *'  # 00:00 JST
  workflow_dispatch:

jobs:
  bump:
    uses: possession-community/modsharp-publish-action/.github/workflows/bump-nuget.yml@v1
    permissions:
      contents: write
      pull-requests: write
    with:
      package-id: ModSharp.Sharp.Shared
      csproj-paths: |
        TnmsAdministrationPlatform/TnmsAdministrationPlatform.csproj
        TnmsAdministrationPlatform.Shared/TnmsAdministrationPlatform.Shared.csproj
      pr-labels: dependencies
