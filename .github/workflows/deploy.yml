name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  cicd:
    uses: possession-community/modsharp-publish-action/.github/workflows/deploy.yml@v1
    with:
      projects: TnmsAdministrationPlatform
      shared-projects-phase1: TnmsAdministrationPlatform.Shared
      platforms: linux-x64 win-x64
      main-artifact-name: TnmsAdministrationPlatform
      main-artifact-include: shared
      shared-dlls-to-remove: |
        TnmsAdministrationPlatform.Shared.dll
      nuget-project-dirs: TnmsAdministrationPlatform.Shared
      nuget-config-props: config.props
    secrets:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

  release:
    needs: cicd
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-artifacts*
          merge-multiple: true
          path: artifacts/
      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Release ${GITHUB_REF_NAME}" \
            --generate-notes \
            artifacts/*.zip
